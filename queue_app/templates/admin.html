<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <div class="logo">⚙️ Admin Panel</div>
    <a href="/logout">Logout</a>
</div>

<div class="dashboard">

    <div class="welcome">
        <h2>Admin Control Panel</h2>
        <p>Manage queue & emergency requests</p>
    </div>

    <div class="action-card">
        <h3>📋 Current Queue</h3>

        {% for q in queue %}
        <div class="row">

            <!-- ✅ USER INFO -->
            <div>
                <strong>🎫 Token: {{ q[1] }}</strong><br>

                👤 Name: {{ q[4] if q[4] else "Unknown" }}<br>
                📧 Email: {{ q[0] }}

                {% if q[2] == 1 %}
                    <br><span style="color:red;">🚨 Emergency</span>
                {% endif %}

                {% if q[3] %}
                    <br><small>Reason: {{ q[3] }}</small>
                {% endif %}
            </div>

            <!-- ACTION BUTTONS -->
            <form method="POST">
                <input type="hidden" name="email" value="{{ q[0] }}">

                <button name="action" value="remove">❌ Remove</button>
            </form>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
